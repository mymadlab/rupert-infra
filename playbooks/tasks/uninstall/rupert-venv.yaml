# Tasks required for uninstalling Rupert Virtual Environment (rupert_venv)
- name: Delete the link to the rupert venv
  ansible.builtin.file:
    src: "{{ app_directory }}/rupert_venv-{{ rupert_venv_version }}"
    dest: "{{ app_directory }}/rupert_venv"
    state: absent
  when: not ansible_check_mode # Check will fail if Rupert venv has not already been deployed
- name: Delete the rupert venv
  ansible.builtin.file:
    path: "{{ app_directory }}/rupert_venv-{{ rupert_venv_version }}"
    state: absent
  when: not ansible_check_mode # Check will fail if Rupert venv has not already been deployed