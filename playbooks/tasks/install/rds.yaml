# Tasks required for Rupert Device Services (RDS)
- name: Install Rupert Device Services python dependencies
  ansible.builtin.pip:
    name:
      - "tinytuya=={{ tinytuya_version }}"
    virtualenv: "{{ app_directory }}/rupert_venv-{{ rupert_venv_version }}"
    virtualenv_command: /usr/bin/python3 -m venv
