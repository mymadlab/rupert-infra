# Tasks required for Rupert Audio Player (RAP)
- name: Update apt cache if stale
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true
- name: Install VLC Media Player
  ansible.builtin.apt:
    name: vlc
    state: present
    update_cache: false
  become: true
- name: Install Rupert Audio Player python dependencies
  ansible.builtin.pip:
    name:
      - "python-vlc~={{ python_vlc_version }}"
    virtualenv: "{{ app_directory }}/rupert_venv-{{ rupert_venv_version }}"
    virtualenv_command: /usr/bin/python3 -m venv

